# ═══════════════════════════════════════════════════════════════
# AELA — Configuração da Aplicação
# ═══════════════════════════════════════════════════════════════

# ── Servidor ─────────────────────────────────────────────────
server.port=8080
spring.application.name=aela-api

# ── Banco de Dados Oracle ─────────────────────────────────────
# Substitua os valores abaixo pelos dados da sua instância Oracle.
# Para Oracle XE local: host=localhost, port=1521, service=XEPDB1
# Para Oracle na FIAP (Classroom): use as credenciais fornecidas.
spring.datasource.url=
spring.datasource.username=RM
spring.datasource.password=ddmmaa
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Pool de conexões (HikariCP — padrão do Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ───────────────────────────────────────────
# update: cria tabelas se não existirem e atualiza estrutura
# Em produção real, usar 'validate' e Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# ── Serialização JSON ─────────────────────────────────────────
# Não serializa campos null na resposta (resposta mais limpa)
spring.jackson.default-property-inclusion=non_null
# Datas em formato ISO-8601 (ex: 2025-06-01T14:30:00)
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Actuator (monitoramento) ──────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
info.app.name=AELA API
info.app.description=Adaptive Exposome Life Assessment
info.app.version=1.0.0

# ── Log ───────────────────────────────────────────────────────
logging.level.br.com.aela=DEBUG
logging.level.org.hibernate.SQL=DEBUG
